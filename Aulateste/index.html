<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de inputs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Exemplo de Inputs</h1>
    <form>
        <label>Texto: </label>
        <input type="text" placeholder="Nome completo">

        <label>Senha: </label>
        <input type="password" placeholder="senha">

        <label>Email: </label>
        <input type="email" placeholder="E-mail@email.com">

        <label>Número: </label>
        <input type="number" placeholder="Número" min="1" max="500">

        <label>Telefone: </label>
        <input type="tel" placeholder="(99) 99999-9999">

        <label>URL: </label>
        <input type="url" placeholder="https://example.com">

        <label>Data: </label>
        <input type="date" placeholder="dd/mm/aaaa">

        <Label>Data e Hora</Label>
        <input type="datetime-local" placeholder="dd/mm/aaaa hh:mm:ss">

        <label>Cor: </label>
        <input type="color">

        <label>CheckBox: </label>
        <input type="checkbox"> Aceito os termos de uso
        
        <label>Radio: </label>
        <input type="radio" name="genero" value="M"> Masculino
        <input type="radio" name="genero" value="F"> Feminino

    <div class="bottons">
        <input type="Submit" value="Enviar">
        <input type="reset" value="Limpar">
    </div>
    </form>
</body>
</html>
